<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環境光影研究系統</title>
    <style>
        :root { --primary-color: #3498db; --success-color: #2ecc71; --bg-color: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; max-width: 550px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input[type=text] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        #calibrationSection, #surveySection { display: none; }
        
        /* 動態生成的題目樣式 */
        .question { margin: 30px 0; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .q-header { display: flex; justify-content: space-between; font-size: 0.95em; }
        .status-mark { color: #e74c3c; font-weight: bold; font-size: 0.8em; }
        .status-mark.done { color: var(--success-color); }
        
        input[type=range] { width: 100%; margin: 15px 0; -webkit-appearance: none; background: #dfe6e9; height: 6px; border-radius: 3px; }
        input[type=range].untouched::-webkit-slider-thumb { -webkit-appearance: none; width: 0; height: 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; background: var(--primary-color); border: 2px solid white; cursor: pointer; }
        .labels { display: flex; justify-content: space-between; font-size: 0.8em; color: #7f8c8d; }

        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        #startBtn { background: var(--success-color); color: white; }
        #submitBtn { background: var(--primary-color); color: white; }
        #submitBtn:disabled { background: #ccc; cursor: not-allowed; }

        .loader-box { text-align: center; padding: 40px 0; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>數位生物標記採集</h2>
    
    <div id="setupSection">
        <div class="input-group">
            <label>請輸入您的使用者代號：</label>
            <input type="text" id="userId" placeholder="例如：P001" required>
        </div>
        <button id="startBtn">啟動並開始研究</button>
    </div>

    <div id="calibrationSection">
        <div class="loader-box">
            <div class="spinner"></div>
            <p id="loadingStatus">正在讀取題目與環境校準中...</p>
        </div>
    </div>

    <div id="surveySection">
        <div id="dynamicQuestions"></div>
        <button id="submitBtn" disabled>請完成所有題目</button>
    </div>

    <div id="status"></div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="50" height="50"></canvas>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbypE3-3d0dBZlg_381RPIktGmeigHTQnuK9n6qj3hBgHEu0XFlbwjUvtNkqQXOcllrV/exec"; 
    
    let lightLogs = [];
    let isMonitoring = false;
    let touchedQuestions = new Set();
    let totalQuestionCount = 0;

    // 啟動按鈕點擊
    document.getElementById('startBtn').onclick = async () => {
        const userId = document.getElementById('userId').value.trim();
        if (!userId) return alert("請輸入代號");

        try {
            // 請求相機權限
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
            
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('calibrationSection').style.display = 'block';
            
            isMonitoring = true;
            startMonitoring();

            // 平行執行：5秒倒數 與 抓取題目
            const [questions] = await Promise.all([
                fetchQuestions(),
                new Promise(res => setTimeout(res, 5000))
            ]);

            renderQuestions(questions);
            
            document.getElementById('calibrationSection').style.display = 'none';
            document.getElementById('surveySection').style.display = 'block';

        } catch (err) { alert("啟動失敗，請檢查相機權限"); }
    };

    async function fetchQuestions() {
        const response = await fetch(GAS_URL);
        return await response.json();
    }

    function renderQuestions(questions) {
        const container = document.getElementById('dynamicQuestions');
        totalQuestionCount = questions.length;
        
        questions.forEach((q, index) => {
            const html = `
                <div class="question">
                    <div class="q-header">
                        <label>${index + 1}. ${q.text}</label>
                        <span id="mark-${index}" class="status-mark">● 待填</span>
                    </div>
                    <input type="range" class="untouched" id="q-${index}" min="0" max="100" value="50" 
                           oninput="onSliderTouch(${index})">
                    <div class="labels"><span>${q.minLabel}</span><span>${q.maxLabel}</span></div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    function onSliderTouch(index) {
        const slider = document.getElementById(`q-${index}`);
        slider.classList.remove('untouched');
        touchedQuestions.add(index);
        
        const mark = document.getElementById(`mark-${index}`);
        mark.innerText = '✓ 已填';
        mark.classList.add('done');

        if (touchedQuestions.size === totalQuestionCount) {
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.innerText = "提交數據";
        }
    }

    function startMonitoring() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        setInterval(() => {
            if (isMonitoring && video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, 50, 50);
                const data = ctx.getImageData(0, 0, 50, 50).data;
                let b = 0;
                for (let i = 0; i < data.length; i += 4) {
                    b += (0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2]);
                }
                lightLogs.push(Math.round(b / (data.length / 4)));
            }
        }, 1000);
    }

    document.getElementById('submitBtn').onclick = async () => {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "上傳中...";
        isMonitoring = false;

        const answers = {};
        for(let i=0; i<totalQuestionCount; i++) {
            answers[`q${i+1}`] = document.getElementById(`q-${i}`).value;
        }

        const payload = {
            userId: document.getElementById('userId').value,
            answers: answers,
            lightLogs: lightLogs
        };

        try {
            await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            document.querySelector('.card').innerHTML = "<h3 style='text-align:center;'>提交完成</h3><p style='text-align:center;'>數據已上傳至研究資料庫。</p>";
        } catch (err) { alert("上傳失敗"); btn.disabled = false; }
    };
</script>

</body>
</html>
